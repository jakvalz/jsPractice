<!DOCTYPE html>
<html lang="en">
	<head>

		<title>Cesius/Fahrenheit</title>

		<!-- external CSS link -->
		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<h1>Temperature Converter</h1>
		
		<form>
			<label for="celsius">Celsius</label>
			 <input type="text" id="cel" name="celsius" placeholder="give me a numba"></input>
			<button id="convertC">Convert Celsius</button>
			<label for="fahrenheit">Fahrenheit</label>
			 <input type="text" id="fah" name="fahrenheit" placeholder="give me a numba"></input>
			<button id="convertF">Convert Fahrenheit</button>
			<button id="reset">Reset</button>
		</form>
		<br>
		<h2 id="conversionResult"></h2>
		<h3></h3>

		<script type="text/javascript" src="js/main.js"></script>
	</body>
